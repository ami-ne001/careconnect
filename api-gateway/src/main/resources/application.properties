spring.application.name=api-gateway
server.port=8088

# ---------------------------------------------------------------------------
# Spring Cloud Gateway routes (hardcoded — no Eureka / service discovery)
# ---------------------------------------------------------------------------

# auth-service (8081)
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8081
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**,/api/admin/**

# patient-service (8082)
spring.cloud.gateway.server.webflux.routes[1].id=patient-service
spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:8082
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/patients/**,/api/admissions/**,/api/rooms/**,/api/wards/**,/api/documents/**,/api/notifications/**

# appointment-service (8083)
spring.cloud.gateway.server.webflux.routes[2].id=appointment-service
spring.cloud.gateway.server.webflux.routes[2].uri=http://localhost:8083
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/appointments/**,/api/queue/**,/api/availability/**,/api/unavailability/**

# clinical-service (8084)
spring.cloud.gateway.server.webflux.routes[3].id=clinical-service
spring.cloud.gateway.server.webflux.routes[3].uri=http://localhost:8084
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/clinical/**,/api/consultations/**,/api/surgeries/**,/api/operating-rooms/**,/api/vitals/**

# lab-service (8085)
spring.cloud.gateway.server.webflux.routes[4].id=lab-service
spring.cloud.gateway.server.webflux.routes[4].uri=http://localhost:8085
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/lab/**

# billing-service (8086)
spring.cloud.gateway.server.webflux.routes[5].id=billing-service
spring.cloud.gateway.server.webflux.routes[5].uri=http://localhost:8086
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/billing/**,/api/invoices/**

